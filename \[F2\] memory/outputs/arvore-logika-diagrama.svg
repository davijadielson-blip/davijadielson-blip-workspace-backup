<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     width="2000" height="1600" viewBox="0 0 2000 1600">
  <defs>
    <style>
      .box-title { font-size: 24px; font-weight: bold; font-family: Arial, sans-serif; }
      .box-header { font-size: 20px; font-weight: bold; font-family: Arial, sans-serif; }
      .box-text { font-size: 16px; font-family: Arial, sans-serif; }
      .box-small { font-size: 13px; font-family: Arial, sans-serif; }
      .label-text { font-size: 12px; font-family: Arial, sans-serif; fill: #666; }
      .line { stroke-width: 2; }
      .arrow { stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#666"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="2000" height="1600" fill="white"/>

  <!-- Title -->
  <text x="1000" y="50" class="box-title" text-anchor="middle" fill="#000">ÁRVORE COMPLETA — LÓGIKA CREATIVE</text>
  <text x="1000" y="80" class="label-text" text-anchor="middle" fill="#666">Estrutura Completa com Conselho de IA · Núcleo Humano · Central Pessoal</text>

  <!-- LAYER 1: JADIELSON -->
  <rect x="850" y="100" width="300" height="70" rx="10" fill="#8B0000" stroke="#8B0000" stroke-width="2"/>
  <text x="1000" y="145" class="box-header" text-anchor="middle" fill="white">🫀 JADIELSON</text>

  <!-- Arrow down -->
  <line x1="1000" y1="170" x2="1000" y2="220" class="arrow" stroke="#666"/>

  <!-- LAYER 2: LÔH -->
  <rect x="800" y="220" width="400" height="70" rx="10" fill="#1E90FF" stroke="#1E90FF" stroke-width="2"/>
  <text x="1000" y="265" class="box-header" text-anchor="middle" fill="white">🤖 LÔH · Orquestradora</text>

  <!-- Arrow to CONSELHO -->
  <line x1="1200" y1="255" x2="1450" y2="255" class="arrow" stroke="#666"/>

  <!-- CONSELHO DE IA -->
  <rect x="1450" y="220" width="350" height="70" rx="10" fill="#FFD700" stroke="#FFD700" stroke-width="2"/>
  <text x="1625" y="265" class="box-header" text-anchor="middle" fill="#000">🎯 CONSELHO DE IA</text>
  <text x="1625" y="285" class="box-small" text-anchor="middle" fill="#333">(5 lentes consultivas)</text>

  <!-- Arrow down to C-Levels -->
  <line x1="1000" y1="290" x2="1000" y2="360" class="arrow" stroke="#666"/>

  <!-- LAYER 4: 6 C-LEVELS -->
  <!-- C-LEVEL positions -->
  <g id="c-levels">
    <!-- COO -->
    <rect x="100" y="360" width="200" height="70" rx="10" fill="#32CD32" stroke="#32CD32" stroke-width="2"/>
    <text x="200" y="405" class="box-text" text-anchor="middle" fill="white">⚙️ COO</text>
    <line x1="1000" y1="295" x2="200" y2="360" class="arrow" stroke="#999"/>

    <!-- CMO -->
    <rect x="380" y="360" width="200" height="70" rx="10" fill="#FF6347" stroke="#FF6347" stroke-width="2"/>
    <text x="480" y="405" class="box-text" text-anchor="middle" fill="white">📣 CMO</text>
    <line x1="1000" y1="295" x2="480" y2="360" class="arrow" stroke="#999"/>

    <!-- CRO -->
    <rect x="660" y="360" width="200" height="70" rx="10" fill="#9370DB" stroke="#9370DB" stroke-width="2"/>
    <text x="760" y="405" class="box-text" text-anchor="middle" fill="white">📈 CRO</text>
    <line x1="1000" y1="295" x2="760" y2="360" class="arrow" stroke="#999"/>

    <!-- CFO -->
    <rect x="940" y="360" width="200" height="70" rx="10" fill="#FFA500" stroke="#FFA500" stroke-width="2"/>
    <text x="1040" y="405" class="box-text" text-anchor="middle" fill="white">💰 CFO</text>
    <line x1="1000" y1="295" x2="1040" y2="360" class="arrow" stroke="#999"/>

    <!-- CCO -->
    <rect x="1220" y="360" width="200" height="70" rx="10" fill="#20B2AA" stroke="#20B2AA" stroke-width="2"/>
    <text x="1320" y="405" class="box-text" text-anchor="middle" fill="white">🎬 CCO</text>
    <line x1="1000" y1="295" x2="1320" y2="360" class="arrow" stroke="#999"/>

    <!-- CAIO -->
    <rect x="1500" y="360" width="200" height="70" rx="10" fill="#DC143C" stroke="#DC143C" stroke-width="2"/>
    <text x="1600" y="405" class="box-text" text-anchor="middle" fill="white">🤖 CAIO</text>
    <line x1="1000" y1="295" x2="1600" y2="360" class="arrow" stroke="#999"/>
  </g>

  <!-- LAYER 5: AGENTES OPERACIONAIS (amostra) -->
  <g id="agents">
    <!-- COO Agents -->
    <rect x="80" y="530" width="140" height="50" rx="8" fill="#696969" stroke="#696969" stroke-width="1.5"/>
    <text x="150" y="560" class="box-small" text-anchor="middle" fill="white">OKRs</text>
    <line x1="200" y1="430" x2="150" y2="530" class="arrow" stroke="#999" stroke-width="1.5"/>

    <rect x="80" y="600" width="140" height="50" rx="8" fill="#696969" stroke="#696969" stroke-width="1.5"/>
    <text x="150" y="630" class="box-small" text-anchor="middle" fill="white">Processos</text>
    <line x1="200" y1="430" x2="150" y2="600" class="arrow" stroke="#999" stroke-width="1.5"/>

    <!-- CMO Agents -->
    <rect x="360" y="530" width="140" height="50" rx="8" fill="#696969" stroke="#696969" stroke-width="1.5"/>
    <text x="430" y="560" class="box-small" text-anchor="middle" fill="white">STP</text>
    <line x1="480" y1="430" x2="430" y2="530" class="arrow" stroke="#999" stroke-width="1.5"/>

    <rect x="360" y="600" width="140" height="50" rx="8" fill="#696969" stroke="#696969" stroke-width="1.5"/>
    <text x="430" y="630" class="box-small" text-anchor="middle" fill="white">Funil Vendas</text>
    <line x1="480" y1="430" x2="430" y2="600" class="arrow" stroke="#999" stroke-width="1.5"/>

    <!-- CRO Agents -->
    <rect x="640" y="530" width="140" height="50" rx="8" fill="#696969" stroke="#696969" stroke-width="1.5"/>
    <text x="710" y="560" class="box-small" text-anchor="middle" fill="white">Prospect</text>
    <line x1="760" y1="430" x2="710" y2="530" class="arrow" stroke="#999" stroke-width="1.5"/>

    <rect x="640" y="600" width="140" height="50" rx="8" fill="#696969" stroke="#696969" stroke-width="1.5"/>
    <text x="710" y="630" class="box-small" text-anchor="middle" fill="white">CRM / SDR</text>
    <line x1="760" y1="430" x2="710" y2="600" class="arrow" stroke="#999" stroke-width="1.5"/>

    <!-- CFO Agents -->
    <rect x="920" y="530" width="140" height="50" rx="8" fill="#696969" stroke="#696969" stroke-width="1.5"/>
    <text x="990" y="560" class="box-small" text-anchor="middle" fill="white">Caixa</text>
    <line x1="1040" y1="430" x2="990" y2="530" class="arrow" stroke="#999" stroke-width="1.5"/>

    <rect x="920" y="600" width="140" height="50" rx="8" fill="#696969" stroke="#696969" stroke-width="1.5"/>
    <text x="990" y="630" class="box-small" text-anchor="middle" fill="white">Custos</text>
    <line x1="1040" y1="430" x2="990" y2="600" class="arrow" stroke="#999" stroke-width="1.5"/>

    <!-- CCO Agents -->
    <rect x="1200" y="530" width="140" height="50" rx="8" fill="#696969" stroke="#696969" stroke-width="1.5"/>
    <text x="1270" y="560" class="box-small" text-anchor="middle" fill="white">Roteiro</text>
    <line x1="1320" y1="430" x2="1270" y2="530" class="arrow" stroke="#999" stroke-width="1.5"/>

    <rect x="1200" y="600" width="140" height="50" rx="8" fill="#696969" stroke="#696969" stroke-width="1.5"/>
    <text x="1270" y="630" class="box-small" text-anchor="middle" fill="white">Design/Motion</text>
    <line x1="1320" y1="430" x2="1270" y2="600" class="arrow" stroke="#999" stroke-width="1.5"/>

    <!-- CAIO Agents -->
    <rect x="1480" y="530" width="140" height="50" rx="8" fill="#696969" stroke="#696969" stroke-width="1.5"/>
    <text x="1550" y="560" class="box-small" text-anchor="middle" fill="white">AI Maturity</text>
    <line x1="1600" y1="430" x2="1550" y2="530" class="arrow" stroke="#999" stroke-width="1.5"/>

    <rect x="1480" y="600" width="140" height="50" rx="8" fill="#696969" stroke="#696969" stroke-width="1.5"/>
    <text x="1550" y="630" class="box-small" text-anchor="middle" fill="white">Arquiteto</text>
    <line x1="1600" y1="430" x2="1550" y2="600" class="arrow" stroke="#999" stroke-width="1.5"/>
  </g>

  <!-- LAYER 6: NÚCLEO HUMANO -->
  <g id="human-nucleus">
    <line x1="150" y1="670" x2="150" y2="850" class="arrow" stroke="#666" stroke-width="2"/>
    <rect x="80" y="850" width="140" height="60" rx="8" fill="#000000" stroke="#000000" stroke-width="2"/>
    <text x="150" y="880" class="box-small" text-anchor="middle" fill="white">🫀 CAPTAÇÃO</text>
    <text x="150" y="902" class="label-text" text-anchor="middle" fill="white">(Você)</text>

    <line x1="430" y1="670" x2="430" y2="850" class="arrow" stroke="#666" stroke-width="2"/>
    <rect x="360" y="850" width="140" height="60" rx="8" fill="#000000" stroke="#000000" stroke-width="2"/>
    <text x="430" y="880" class="box-small" text-anchor="middle" fill="white">🫀 EDIÇÃO</text>
    <text x="430" y="902" class="label-text" text-anchor="middle" fill="white">(Você)</text>

    <line x1="710" y1="670" x2="710" y2="850" class="arrow" stroke="#666" stroke-width="2"/>
    <rect x="640" y="850" width="140" height="60" rx="8" fill="#000000" stroke="#000000" stroke-width="2"/>
    <text x="710" y="880" class="box-small" text-anchor="middle" fill="white">👤 DESIGN</text>
    <text x="710" y="902" class="label-text" text-anchor="middle" fill="white">(Ewander)</text>

    <line x1="990" y1="670" x2="990" y2="850" class="arrow" stroke="#666" stroke-width="2"/>
    <rect x="920" y="850" width="140" height="60" rx="8" fill="#000000" stroke="#000000" stroke-width="2"/>
    <text x="990" y="880" class="box-small" text-anchor="middle" fill="white">🤝 TRÁFEGO</text>
    <text x="990" y="902" class="label-text" text-anchor="middle" fill="white">(Carlos)</text>

    <line x1="1270" y1="670" x2="1270" y2="850" class="arrow" stroke="#666" stroke-width="2"/>
    <rect x="1200" y="850" width="140" height="60" rx="8" fill="#000000" stroke="#000000" stroke-width="2"/>
    <text x="1270" y="880" class="box-small" text-anchor="middle" fill="white">🫀 CLOSER</text>
    <text x="1270" y="902" class="label-text" text-anchor="middle" fill="white">(Você)</text>

    <line x1="1550" y1="670" x2="1550" y2="850" class="arrow" stroke="#666" stroke-width="2"/>
    <rect x="1480" y="850" width="140" height="60" rx="8" fill="#000000" stroke="#000000" stroke-width="2"/>
    <text x="1550" y="880" class="box-small" text-anchor="middle" fill="white">🫀 PAGTOS</text>
    <text x="1550" y="902" class="label-text" text-anchor="middle" fill="white">(Você)</text>
  </g>

  <!-- CENTRAL PESSOAL (PARALELO) -->
  <g id="central-pessoal">
    <rect x="1750" y="450" width="200" height="60" rx="8" fill="#4B0082" stroke="#4B0082" stroke-width="2"/>
    <text x="1850" y="485" class="box-text" text-anchor="middle" fill="white">🏠 CENTRAL</text>

    <rect x="1750" y="530" width="200" height="50" rx="8" fill="#9932CC" stroke="#9932CC" stroke-width="1.5"/>
    <text x="1850" y="560" class="box-small" text-anchor="middle" fill="white">Alfred · Arca</text>

    <rect x="1750" y="600" width="200" height="50" rx="8" fill="#9932CC" stroke="#9932CC" stroke-width="1.5"/>
    <text x="1850" y="630" class="box-small" text-anchor="middle" fill="white">Warren + 6 agentes</text>
  </g>

  <!-- LEGENDA -->
  <g id="legend">
    <text x="50" y="1050" class="box-text" text-anchor="start" fill="#000">LEGENDA:</text>

    <rect x="50" y="1070" width="50" height="35" rx="5" fill="#8B0000" stroke="#8B0000" stroke-width="1.5"/>
    <text x="75" y="1092" class="box-small" text-anchor="middle" fill="white">🫀</text>
    <text x="120" y="1092" class="label-text" text-anchor="start" fill="#000">Humano (Você, Ewander, Carlos)</text>

    <rect x="50" y="1125" width="50" height="35" rx="5" fill="#1E90FF" stroke="#1E90FF" stroke-width="1.5"/>
    <text x="75" y="1147" class="box-small" text-anchor="middle" fill="white">🤖</text>
    <text x="120" y="1147" class="label-text" text-anchor="start" fill="#000">Agente IA (Orquestra + C-Levels)</text>

    <rect x="50" y="1180" width="50" height="35" rx="5" fill="#696969" stroke="#696969" stroke-width="1.5"/>
    <text x="75" y="1202" class="box-small" text-anchor="middle" fill="white">O</text>
    <text x="120" y="1202" class="label-text" text-anchor="start" fill="#000">Agente Operacional (executa)</text>

    <text x="50" y="1260" class="label-text" text-anchor="start" fill="#666">Setas = Responsabilidade / Roteamento · Cor = Departamento · Estrutura 2 andares: Cérebro (C-levels) + Mãos (Operacional) + Base (Humano)</text>
  </g>

  <!-- Data -->
  <text x="1950" y="1550" class="label-text" text-anchor="end" fill="#999">2026-06-06</text>
</svg>